<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>IPTV Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#00b4d8;
  --text:#f1f1f5;--text2:#9090b0;--text3:#60607a;
  --border:#ffffff15;--success:#22c55e;--danger:#f85149;
}
html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:system-ui,sans-serif}

/* ── IPTV picker screen ── */
#pick-screen{
  position:fixed;inset:0;z-index:10;
  background:url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920') center/cover;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
}
#pick-screen::before{content:'';position:absolute;inset:0;background:#000000aa;backdrop-filter:blur(4px)}
#pick-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:700px;padding:0 24px}
#pick-screen h2{font-size:1.4rem;font-weight:700;color:var(--text2)}
#iptv-list{display:flex;flex-direction:column;gap:10px;width:100%}
.iptv-card{
  background:#ffffff10;backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:14px;
}
.iptv-card:hover{border-color:var(--accent);background:#00b4d815;transform:translateX(4px)}
.iptv-icon{font-size:1.4rem;flex-shrink:0}
.iptv-icon-img{width:36px;height:36px;object-fit:contain;flex-shrink:0;filter:invert(1)}
.iptv-info{flex:1;min-width:0}
.iptv-name{font-size:.95rem;font-weight:700}
.iptv-meta{font-size:.72rem;color:var(--text3);margin-top:2px}
.iptv-arrow{color:var(--text3);font-size:1.1rem}

/* ── Player screen ── */
#player-screen{position:fixed;inset:0;z-index:5;display:none}

/* Full screen video */
video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}

/* Video overlay */
#vid-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:none;z-index:2}
#vid-spin{width:48px;height:48px;border:3px solid #ffffff20;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
#vid-msg{font-size:.9rem;color:#ffffffaa;display:none}
#vid-err{font-size:.85rem;color:#fca5a5;display:none;text-align:center}

/* Sidebar overlay */
#sidebar{
  position:absolute;top:0;left:0;bottom:0;width:300px;z-index:10;
  background:linear-gradient(to right,#000000dd,#000000aa);
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .3s ease,opacity .3s ease;
}
#sidebar.hidden{transform:translateX(-100%);opacity:0;pointer-events:none}

/* Sidebar header */
#sb-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#sb-back-btn{display:none}
#sb-header-title{font-size:.88rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sb-search-wrap{position:relative;flex-shrink:0}
#sb-search{background:#ffffff10;border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:7px;font-size:.76rem;outline:none;width:100px;transition:width .2s}
#sb-search:focus{border-color:var(--accent);width:130px}
#sb-search::placeholder{color:var(--text3)}


/* Sidebar content */
#sb-content{flex:1;overflow-y:auto;overflow-x:hidden}
#sb-content::-webkit-scrollbar{width:3px}
#sb-content::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}

/* Bouquet items */
.bqi{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.bqi:hover{background:#ffffff10}
.bqi.on{background:#ffffff12;border-left-color:var(--accent)}
.bqi-icon{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center}
.bqi-info{min-width:0;flex:1}
.bqi-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bqi-count{font-size:.66rem;color:var(--text3);margin-top:1px}

/* Channel items */
.chi{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.chi:hover{background:#ffffff10}
.chi.on{background:#ffffff12;border-left-color:var(--accent)}
.chi.playing{background:#22c55e10;border-left-color:var(--success)}
.chi-num{font-size:.7rem;color:var(--text3);width:20px;text-align:right;flex-shrink:0}
.chi-logo{width:32px;height:32px;object-fit:contain;border-radius:5px;flex-shrink:0;background:#ffffff10}
.chi-init{width:32px;height:32px;border-radius:6px;background:#ffffff12;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:var(--text3);flex-shrink:0}
.chi-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chi-live{font-size:.58rem;color:var(--success);font-weight:700;background:#22c55e15;padding:2px 5px;border-radius:4px;flex-shrink:0;display:none}
.chi.playing .chi-live{display:block}

/* Now playing bottom bar */
#now-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:9;
  background:linear-gradient(transparent,#000000bb);
  padding:28px 20px 12px;
  display:flex;align-items:center;gap:14px;
  transition:opacity .3s,transform .3s;
}
#now-bar.hidden{opacity:0;pointer-events:none;transform:translateY(10px)}
#now-info{flex:1;min-width:0}
#now-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#now-group{font-size:.72rem;color:var(--text2);margin-top:2px}


/* ── Add playlist modal ── */
.overlay{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.modal{background:#12121a;border:1px solid #ffffff15;border-radius:14px;padding:26px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:1rem;font-weight:700;color:#f1f1f5}
.modal-tabs{display:flex;border-bottom:1px solid #ffffff15}
.mtab{padding:8px 16px;font-size:.82rem;cursor:pointer;border-bottom:2px solid transparent;color:#50506a;transition:all .15s;margin-bottom:-1px}
.mtab.on{border-bottom-color:var(--accent);color:#f1f1f5}
.mpanel{display:none;flex-direction:column;gap:12px}
.mpanel.on{display:flex}
.mfield{display:flex;flex-direction:column;gap:5px}
.mfield label{font-size:.75rem;color:#9090b0;font-weight:500}
.mfield input{background:#1a1a26;border:1px solid #ffffff15;color:#f1f1f5;padding:9px 12px;border-radius:8px;font-size:.88rem;outline:none;transition:border-color .15s}
.mfield input:focus{border-color:var(--accent)}
.merr{font-size:.78rem;color:#f85149;display:none}
.mstat{font-size:.78rem;color:#9090b0;display:none}
.mbtns{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
.mbtn{padding:9px 20px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.mbtn.ok{background:var(--accent2);color:#fff}
.mbtn.ok:hover{background:var(--accent)}
.mbtn.ok:disabled{opacity:.4;cursor:not-allowed}
.mbtn.cx{background:#1a1a26;border:1px solid #ffffff15;color:#9090b0;cursor:pointer}

/* Add button on picker */
#add-pl-btn{
  background:transparent;border:1px solid #ffffff20;
  color:#9090b0;padding:8px 20px;border-radius:8px;
  cursor:pointer;font-size:.8rem;font-weight:600;
  transition:all .15s;margin-top:8px;
}
#add-pl-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<!-- IPTV picker -->
<div id="pick-screen">
  <div id="pick-inner">
    <h2>Select your IPTV</h2>
    <div id="iptv-list"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="add-pl-btn" onclick="openPlMod('url')">＋ Add URL</button>
      <button id="add-pl-btn" style="margin-top:0" onclick="addFile()">＋ Add File</button>
    </div>
  </div>
</div>

<!-- Player -->
<div id="player-screen">
  <video id="vid" autoplay playsinline></video>
  <div id="vid-overlay">
    <div id="vid-spin"></div>
    <div id="vid-msg"></div>
    <div id="vid-err"></div>
  </div>

  <div id="sidebar">
    <div id="sb-header">
      <div id="sb-header-title">Bouquets</div>
      <div id="sb-search-wrap">
        <input id="sb-search" type="text" placeholder="Search"/>
      </div>
    </div>
    <div id="sb-content"></div>
  </div>

  <div id="now-bar">
    <div id="now-info">
      <div id="now-name"></div>
      <div id="now-group"></div>
    </div>

  </div>
</div>

let currentIptv=null;
async function openIPTV(pl){
  currentIptv=pl;
  $('pick-screen').style.display='none';
  $('player-screen').style.display='block';
  showBouquets();
  $('sb-header-title').textContent='Loading…';
  try{
    const res=await window.api.loadPlaylist(pl);
    if(!res.success)throw new Error(res.error);
    allChannels=res.channels;
  }catch(e){allChannels=[];$('sb-header-title').textContent='Error: '+e.message;return;}
  if(!allChannels.length){$('sb-header-title').textContent='No channels found';return;}
  // Build bouquets
  const gMap=new Map();
  allChannels.forEach(c=>{if(!gMap.has(c.group))gMap.set(c.group,[]);gMap.get(c.group).push(c);});
  bouquets=[...gMap.entries()].map(([name,chs])=>({name,channels:chs}));

  $('pick-screen').style.display='none';
  $('player-screen').style.display='block';

  // Play last channel or first
  const lastUrl=lastPlayed[iptv.id];
  const last=lastUrl?allChannels.find(c=>c.url===lastUrl)||allChannels[0]:allChannels[0];
  if(last)playCh(last);

  // Show bouquets in sidebar
  showBouquets();
  resetHideTimer();
}

function goBackToIPTV(){
  vid.pause();vid.removeAttribute('src');vid.load();
  playingCh=null;playId++;
  $('player-screen').style.display='none';
  $('pick-screen').style.display='flex';
  renderHome();
  clearTimeout(hideTimer);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function getBqIcon(n){n=n.toLowerCase();
  if(/sport|football/.test(n))return'⚽';if(/movie|film/.test(n))return'🎬';
  if(/news/.test(n))return'📰';if(/kids|cartoon/.test(n))return'🧸';
  if(/music/.test(n))return'🎵';if(/series/.test(n))return'📺';if(/radio/.test(n))return'📻';return'📡';
}

function showBouquets(){
  sbView='bouquets';
  $('sb-header-title').textContent='Bouquets';
  $('sb-search').value='';
  filteredItems=[...bouquets];
  activeChIdx=0;
  renderSidebar();
}

function showChannels(bq, idx){
  sbView='channels';
  activeBqIdx=idx;
  $('sb-header-title').textContent=bq.name;
  $('sb-search').value='';
  filteredItems=[...bq.channels];
  activeChIdx=0;
  renderSidebar();
}

function renderSidebar(){
  const content=$('sb-content');content.innerHTML='';
  if(sbView==='bouquets'){
    filteredItems.forEach((bq,i)=>{
      const d=document.createElement('div');d.className='bqi'+(i===activeBqIdx?' on':'');
      d.innerHTML=`<div class="bqi-icon">${getBqIcon(bq.name)}</div>
        <div class="bqi-info"><div class="bqi-name">${bq.name}</div><div class="bqi-count">${bq.channels.length} channels</div></div>`;
      d.onclick=()=>{resetHideTimer();showChannels(bouquets[i],i);};
      content.appendChild(d);
    });
  } else {
    filteredItems.forEach((ch,i)=>{
      const isPlaying=playingCh&&playingCh.url===ch.url;
      const d=document.createElement('div');d.className='chi'+(i===activeChIdx?' on':'')+(isPlaying?' playing':'');
      const init=ch.name.slice(0,2).toUpperCase();
      const logo=ch.logo?`<img class="chi-logo" src="${ch.logo}" onerror="this.outerHTML='<div class=chi-init>${init}</div>'">`:
        `<div class="chi-init">${init}</div>`;
      d.innerHTML=`<div class="chi-num">${i+1}</div>${logo}<div class="chi-name">${ch.name}</div><div class="chi-live">▶ LIVE</div>`;
      d.onclick=()=>{resetHideTimer();selCh(i);};
      content.appendChild(d);
    });
  }
}


$('sb-search').oninput=e=>{
  const q=e.target.value.toLowerCase();
  if(sbView==='bouquets') filteredItems=bouquets.filter(b=>b.name.toLowerCase().includes(q));
  else filteredItems=bouquets[activeBqIdx].channels.filter(c=>c.name.toLowerCase().includes(q));
  activeChIdx=0;renderSidebar();
};

// ── Channel selection ─────────────────────────────────────────────────────────
function selCh(idx){
  activeChIdx=idx;
  playCh(filteredItems[idx]);
  renderSidebar();
  const el=$('sb-content').querySelectorAll(sbView==='channels'?'.chi':'.bqi')[idx];
  if(el)el.scrollIntoView({block:'nearest'});
}

// ── Playback ──────────────────────────────────────────────────────────────────
function playCh(ch){
  const id=++playId;
  playingCh=ch;
  // Save last played per iptv
  if(currentIptv)lastPlayed[currentIptv.id]=ch.url;
  setOverlay('spin',ch.name);
  $('now-name').textContent=ch.name;
  $('now-group').textContent=ch.group;
  vid.src=ch.url;vid.load();
  vid.oncanplay=()=>{if(id!==playId)return;setOverlay('none');vid.play().catch(()=>{});};
  vid.onwaiting=()=>{if(id!==playId)return;setOverlay('spin');};
  vid.onplaying=()=>{if(id!==playId)return;setOverlay('none');};
  vid.onerror=()=>{if(id!==playId)return;setOverlay('err','Stream error. Try another channel.');};
}

function setOverlay(s,txt){
  $('vid-spin').style.display='none';$('vid-msg').style.display='none';$('vid-err').style.display='none';
  if(s==='spin'){$('vid-spin').style.display='block';if(txt){$('vid-msg').textContent=txt;$('vid-msg').style.display='block';}}
  else if(s==='err'){$('vid-err').textContent=txt;$('vid-err').style.display='block';}
}

vid.volume=1;

// ── Auto-hide ─────────────────────────────────────────────────────────────────
function showUI(){$('sidebar').classList.remove('hidden');$('now-bar').classList.remove('hidden');}
function hideUI(){$('sidebar').classList.add('hidden');$('now-bar').classList.add('hidden');}
function resetHideTimer(){showUI();clearTimeout(hideTimer);hideTimer=setTimeout(hideUI,2000);}

document.addEventListener('mousemove',resetHideTimer);

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  resetHideTimer();
  if(e.key==='Escape'){
    if(sbView==='channels'){showBouquets();}
    else goBackToIPTV();
    return;
  }
  if(document.activeElement===$('sb-search'))return;
  if(e.key==='ArrowUp'){e.preventDefault();if(sbView==='channels')selCh(Math.max(0,activeChIdx-1));}
  else if(e.key==='ArrowDown'){e.preventDefault();if(sbView==='channels')selCh(Math.min(filteredItems.length-1,activeChIdx+1));}
  else if(e.key==='Enter'&&sbView==='channels'){e.preventDefault();selCh(activeChIdx);}
  else if(e.key===' '){e.preventDefault();if(vid.paused)vid.play();else vid.pause();}
});

// ── Gamepad ───────────────────────────────────────────────────────────────────
{
  let gint=null,prev={},lastMove=0,fast=false;
  const start=()=>{
    if(gint)return;
    gint=setInterval(()=>{
      const gps=navigator.getGamepads();let gp=null;
      for(const g of gps){if(g){gp=g;break;}}if(!gp)return;
      const btn=i=>gp.buttons[i]?.pressed??false;
      const just=i=>{const c=btn(i),w=prev[i];prev[i]=c;return c&&!w;};
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);
      resetHideTimer();
      if(just(1)){
        if(sbView==='channels')showBouquets();
        else goBackToIPTV();
        return;
      }
      if(just(0)&&sbView==='channels'){selCh(activeChIdx);return;}
      if(just(9)){if(vid.paused)vid.play();else vid.pause();return;}
      const up=btn(12)||(gp.axes[1]??0)<-.5,dn=btn(13)||(gp.axes[1]??0)>.5;
      if(up||dn){
        const now=Date.now();
        if(now-lastMove>(fast?80:300)){
          if(sbView==='channels')selCh(dn?Math.min(activeChIdx+1,filteredItems.length-1):Math.max(activeChIdx-1,0));
          lastMove=now;if(!fast&&now-lastMove>600)fast=true;
        }
      } else fast=false;
    },33);
  };
  window.addEventListener('gamepadconnected',start);
  for(const g of navigator.getGamepads()){if(g){start();break;}}
}

// ── Add playlist modal ────────────────────────────────────────────────────────
let mtab='url';
document.querySelectorAll('.mtab').forEach(t=>{
  t.onclick=()=>{
    mtab=t.dataset.t;
    document.querySelectorAll('.mtab').forEach(x=>x.classList.toggle('on',x.dataset.t===mtab));
    $('tp-url').classList.toggle('on',mtab==='url');
    $('tp-file').classList.toggle('on',mtab==='file');
  };
});
function openPlMod(tab='url'){
  mtab=tab;
  document.querySelectorAll('.mtab').forEach(x=>x.classList.toggle('on',x.dataset.t===mtab));
  $('tp-url').classList.toggle('on',mtab==='url');
  $('tp-file').classList.toggle('on',mtab==='file');
  $('m-name').value='';$('m-url').value='';$('m-fname').value='';$('m-file').value='';
  $('pl-err').style.display='none';$('pl-stat').style.display='none';
  $('pl-overlay').classList.add('on');
  setTimeout(()=>(mtab==='url'?$('m-name'):$('m-fname')).focus(),60);
}
$('pl-cx').onclick=()=>$('pl-overlay').classList.remove('on');
$('pl-overlay').onclick=e=>{if(e.target===$('pl-overlay'))$('pl-overlay').classList.remove('on');};
$('pl-ok').onclick=async()=>{
  $('pl-err').style.display='none';
  const btn=$('pl-ok');btn.disabled=true;
  try{
    if(mtab==='url'){
      const name=$('m-name').value.trim()||'Playlist',url=$('m-url').value.trim();
      if(!url){showPlErr('Please enter a URL');return;}
      showPlStat('Fetching…');
      const res=await window.api.addPlaylistUrl({name,url});
      if(!res.success)throw new Error(res.error);
      db=await window.api.getPlaylists();
      saveDB();renderHome();$('pl-overlay').classList.remove('on');
    } else {
      const name=$('m-fname').value.trim()||'Playlist',file=$('m-file').files[0];
      if(!file){showPlErr('Please choose a file');return;}
      showPlStat('Reading…');
      const res=await window.api.addPlaylistFile();
      if(!res.success){if(res.error!=='Cancelled')throw new Error(res.error);return;}
      db=await window.api.getPlaylists();
      saveDB();renderHome();$('pl-overlay').classList.remove('on');
    }
  }catch(e){showPlErr(e.message||'Failed');}
  btn.disabled=false;$('pl-stat').style.display='none';
};
async function addFile(){
  showPlStat('Opening file…');
  const res=await window.api.addPlaylistFile();
  $('pl-stat').style.display='none';
  if(!res.success){if(res.error!=='Cancelled')showPlErr(res.error||'Failed');return;}
  db=await window.api.getPlaylists();
  saveDB();renderHome();
}

function showPlErr(m){$('pl-err').textContent=m;$('pl-err').style.display='block';$('pl-stat').style.display='none';}
function showPlStat(m){$('pl-stat').textContent=m;$('pl-stat').style.display='block';}
</script>
